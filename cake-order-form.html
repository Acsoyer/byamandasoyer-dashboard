<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>byamandasoyer — Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F6F3; --card:#FFFFFF; --ink:#4A4446; --ink-soft:#8C8C8C; --ink-faint:#B7B1AC;
    --line:#E6E2DC; --brand:#73082C; --accent:#73082C; --accent-soft:#F2E2E8; --pistachio:#73082C;
    --maroon:#73082C; --shadow-sm:0 3px 12px rgba(20,20,20,.06); --radius:20px;
    --ink-quiet:#6E4351;   /* readable but still quiet — for text on pink surfaces */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);font-family:'Montserrat',system-ui,sans-serif;color:var(--ink);margin:0}
  #phone{position:relative;width:100%;height:100vh;height:100dvh;background:var(--bg);overflow:hidden}
  @media (min-width:441px){
    body{background:#ECEAE5;display:flex;align-items:center;justify-content:center}
    #phone{width:393px;height:852px;max-height:96vh;border-radius:30px;box-shadow:0 18px 50px rgba(20,20,20,.12)}
  }

  #screen{position:absolute;inset:0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}

  /* Top */
  #topbar{padding:calc(8px + env(safe-area-inset-top)); padding-right: 20px;padding-bottom: 5px;padding-left: 16px;flex:0 0 auto}
  @media (min-width:441px){#topbar{padding-top:22px}}
  .mini-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;margin-bottom:9px;font-size:12px;font-weight:600;letter-spacing:.03em}
  .mini-row .toplogo{justify-self:start;height:40px;width:auto;display:block;opacity:.9}
  .mini-row .top-actions{justify-self:end;display:flex;align-items:center;gap:4px}
  .mini-row .iconbtn{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    color:var(--brand);font-family:inherit;font-size:15px;line-height:1;cursor:pointer;padding:0;
    display:flex;align-items:center;justify-content:center;transition:transform .12s,background .12s}
  .mini-row .iconbtn:active{transform:scale(.9);background:var(--accent-soft)}
  .mini-row #closeBtn{font-size:18px}
  body.embed .mini-row{display:none}
  body.embed #topbar{padding-top:calc(12px + env(safe-area-inset-top))}
  .mini-row .stepno{justify-self:center;color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap}
  .bar-row{display:flex;align-items:center;gap:12px}
  #back{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--card);
    display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--ink);flex:0 0 auto;cursor:pointer;transition:transform .15s}
  #back:active{transform:scale(.92)}
  #back[hidden]{visibility:hidden}
  #progress{flex:1;height:7px;background:var(--line);border-radius:99px;overflow:hidden}
  #progress > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#A64A67,var(--accent));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
  #cart.almost{background:var(--accent-soft);color:var(--brand)}
  #cart.almost .amt{font-size:13px;font-weight:700}
  #cart{display:flex;align-items:center;gap:7px;background:var(--brand);color:#fff;border-radius:99px;
    padding:8px 13px 8px 11px;font-weight:600;font-size:14px;flex:0 0 auto;box-shadow:var(--shadow-sm)}
  #cart .amt{font-variant-numeric:tabular-nums}
  #cart .pre{font-size:11px;opacity:.7;font-weight:500;margin-right:1px}
  @keyframes bump{0%{transform:scale(1)}35%{transform:scale(1.16) rotate(-3deg)}100%{transform:scale(1)}}
  #cart.bump{animation:bump .42s cubic-bezier(.34,1.56,.64,1)}
  .spark{position:absolute;pointer-events:none;font-size:13px;animation:fly .7s ease-out forwards;z-index:70}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.1)}}

  #body{flex:1;overflow-y:auto;padding:6px 20px 130px;-webkit-overflow-scrolling:touch}
  #body::-webkit-scrollbar{display:none}
  h1.q{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:27px;line-height:1.12;margin:6px 0 4px;letter-spacing:-.01em;color:var(--brand)}
  .sub{color:var(--ink-soft);font-size:14px;line-height:1.45;margin:0 0 16px}
  .note{font-size:12.5px;color:var(--ink-quiet);line-height:1.55;background:#F8F0F3;border:1px solid #EFE0E6;border-radius:14px;padding:11px 13px;margin:8px 0 0}
  .note.soft{margin-top:12px}
  .warn{font-size:12px;color:var(--brand);line-height:1.5;background:#F7ECEF;border:1px solid #E7CBD5;border-radius:14px;padding:12px 13px;margin:14px 0 0}
  .warn b{font-weight:600}
  .policybox{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:4px 15px;margin-bottom:14px}
  .policysec{padding:13px 0;border-bottom:1px solid var(--line)}
  .policysec:last-child{border-bottom:none}
  .policysec h4{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;margin:0 0 5px;color:var(--accent)}
  .policysec p{margin:0;font-size:12.8px;line-height:1.5;color:var(--ink-soft)}

  /* price band (from reference image) */
  .band{background:#F2E2E8;border-radius:14px;padding:9px 12px;display:flex;justify-content:space-between;
    font-family:'Playfair Display',Georgia,serif;font-weight:500;font-size:13.5px;color:var(--ink);margin-bottom:16px;gap:4px}
  .band span{white-space:nowrap}

  /* Option cards */
  .opts{display:flex;flex-direction:column;gap:11px}
  .opts.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .shape-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .scroll-space{height:180px}
  /* flavour accordion — a title with a dropdown chevron, not a button */
  .acc{width:100%;display:flex;align-items:center;gap:8px;background:none;border:none;border-bottom:1px solid var(--line);
    border-radius:0;padding:14px 2px 11px;margin:0 0 2px;cursor:pointer;font-family:inherit;text-align:left}
  .acc .acc-t{flex:1;font-family:'Playfair Display',Georgia,serif;font-size:21px;font-weight:600;color:var(--brand);line-height:1.2}
  .acc .acc-ar{color:var(--ink-faint);font-size:17px;line-height:1;transition:transform .25s;display:block;margin-top:-4px}
  .acc.open{border-bottom-color:transparent;padding-bottom:6px}
  .acc.open .acc-ar{transform:rotate(180deg);color:var(--brand)}
  .acc:active .acc-t{opacity:.6}
  .acc-body.open{margin-bottom:16px;animation:accIn .22s ease}
  @keyframes accIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .flavour-title{font-family:'Playfair Display',Georgia,serif;font-size:21px;font-weight:600;color:var(--brand);line-height:1.2;border-bottom:1px solid var(--line);padding:14px 2px 9px;margin:0 0 10px}
  .flavour-group{margin-bottom:18px}
  .shape-row .shape-card{flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;padding:11px 4px 10px;text-align:center;min-height:0}
  .shape-row .shape-card .ic{width:34px;height:34px;flex:0 0 auto;background:transparent}
  .shape-row .shape-card .ic svg{width:30px;height:30px}
  .shape-row .shape-card .tt{font-size:11.5px;font-weight:600;line-height:1.15}
  .shape-row .shape-card .atag{font-size:11px;margin:0}
  .opt{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:14px 15px;
    display:flex;align-items:center;gap:13px;cursor:pointer;transition:border-color .16s,background .16s,transform .12s;box-shadow:var(--shadow-sm);position:relative;text-align:left;width:100%;font-family:inherit;color:inherit}
  .opt:active{transform:scale(.985)}
  .opt.sel{border-color:var(--accent);background:linear-gradient(0deg,var(--accent-soft),#fff)}
  .opt .ic{flex:0 0 auto;width:48px;height:48px;border-radius:13px;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .opt .tx{flex:1;min-width:0}
  /* keep every multi-select label clear of the checkbox in the top-right */
  .opt.multi .tx{padding-right:26px}
  /* exclusive choices inside a multi list (None / single toggles) show no checkbox */
  .opt.multi.excl .chk{display:none}
  .opt.multi.excl .tx{padding-right:0}
  .opt.multi.excl.sel .ic{background:var(--accent-soft)}
  .opt .tt{display:block;font-weight:600;font-size:15.5px;line-height:1.25}
  .opt .ds{display:block;font-size:12.5px;color:var(--ink-soft);line-height:1.4;margin-top:2px}
  .opt .chk{position:absolute;top:11px;right:11px;width:21px;height:21px;border-radius:50%;border:2px solid var(--line);display:none;align-items:center;justify-content:center;background:#fff}
  .opt.multi .chk{display:flex;border-radius:6px;border-width:2px;border-color:#C9C2BC}
  .opt.multi.sel .chk{background:var(--accent);border-color:var(--accent)}
  .opt.multi .chk svg{opacity:0}.opt.multi.sel .chk svg{opacity:1}
  .opt.no-allergy.sel .chk,.opt.email-optin.sel .chk{background:#2F7A57;border-color:#2F7A57}
  .opt.no-allergy.sel,.opt.email-optin.sel{border-color:#70A88E;background:#EFF7F2}
  .opt.grid-card{flex-direction:column;align-items:center;gap:9px;padding:16px 12px;text-align:center}
  .opt.grid-card .ic{width:64px;height:64px}

  /* price tag (base) vs add tag */
  .ptag{flex:0 0 auto;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:15px;color:var(--brand);
    background:#F2E2E8;border-radius:9px;padding:5px 11px;font-variant-numeric:tabular-nums;letter-spacing:.01em}
  .atag{flex:0 0 auto;font-weight:600;font-size:13.5px;color:var(--accent);font-variant-numeric:tabular-nums}
  .opt.multi .atag{margin-right:26px}
  .opt .qtag{flex:0 0 auto;font-weight:600;font-size:12.5px;color:var(--ink-soft);background:#F2E2E8;border-radius:8px;padding:3px 9px}
  .opt.multi .qtag{margin-right:26px}

  /* tiers */
  .tier{font-family:'Playfair Display',Georgia,serif;font-size:21px;font-weight:600;color:var(--brand);margin:24px 0 11px;display:flex;align-items:center;gap:10px}
  .tier:first-of-type{margin-top:6px}
  .tier .ln{flex:1;height:1px;background:var(--line)}
  .divlabel{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);margin:22px 0 10px;display:flex;align-items:center;gap:10px}
  .divlabel .ln{flex:1;height:1px;background:var(--line)}

  /* swatches named */
  .sw-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .sw-grid.is-disabled{opacity:.4;pointer-events:none;filter:grayscale(.35)}
  .disabled-note{background:var(--accent-soft);color:var(--brand);border-radius:14px;padding:14px;text-align:center;font-weight:600;font-size:13.5px;margin-bottom:16px}
  .sw{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
  .sw .chip{width:100%;aspect-ratio:5/4;border-radius:10px;border:2px solid rgba(0,0,0,.07);position:relative;transition:transform .12s}
  .sw:active .chip{transform:scale(.92)}
  .sw.sel .chip{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
  .sw.sel .chip::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  .sw.light.sel .chip::after{color:var(--ink);text-shadow:none}
  .sw .nm{font-size:9.5px;color:var(--ink-soft);text-align:center;line-height:1.1}
  .sw.sel .nm{color:var(--ink);font-weight:600}
  .pigment-card{border:1.5px solid #E7CBD5;border-radius:18px;padding:13px 13px 4px;margin-top:22px;background:var(--card);box-shadow:0 0 16px rgba(115,8,44,.12)}
  .pig-head{font-size:12.5px;font-weight:600;color:var(--accent);margin-bottom:6px}
  .pig-desc{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin:0 0 11px}
  .pickcount{font-size:12.5px;color:var(--ink-soft);margin:12px 0 0;text-align:center}

  /* fields */
  .field{margin-bottom:15px}
  .field label{display:block;font-weight:600;font-size:13.5px;margin-bottom:6px}
  .field .opt-note{font-weight:400;color:var(--ink-soft);font-size:12px}
  input[type=text],input[type=tel],input[type=email],input[type=date],textarea,select{
    width:100%;border:1.5px solid var(--line);border-radius:14px;background:var(--card);
    padding:13px 14px;font-size:16px;font-family:inherit;color:var(--ink);box-shadow:var(--shadow-sm);outline:none;transition:border-color .15s}
  input:focus,textarea:focus,select:focus{border-color:var(--accent)}
  textarea{resize:none;min-height:88px;line-height:1.45}
  .row2{display:flex;gap:10px}
  .code-wrap{flex:0 0 118px;position:relative}
  select.code{padding-right:26px;appearance:none;-webkit-appearance:none;font-weight:600}
  .code-wrap::after{content:"▾";position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;font-size:18px;font-weight:700;line-height:1}
  .code-wrap.custom::after{display:none}
  .linklike{background:none;border:none;color:var(--accent);font-family:inherit;font-weight:600;font-size:12.5px;cursor:pointer;padding:8px 2px 0;display:inline-block}
  .ig-wrap{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow-sm);overflow:hidden}
  .ig-wrap:focus-within{border-color:var(--accent)}
  .ig-wrap .at{padding:0 4px 0 14px;color:var(--ink-soft);font-size:16px}
  .ig-wrap input{border:none;box-shadow:none;padding-left:2px}
  .time-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:1px}
  .fdp-selected{background:var(--accent-soft);color:var(--accent);font-weight:600;border-radius:12px;padding:10px 12px;text-align:center;margin-bottom:11px;font-size:14px}
  .fdp-selected .selected-rush{display:inline-block;margin-left:6px;font-size:10px;font-weight:600;letter-spacing:.01em;vertical-align:1px}
  .fdp-selected .selected-rush-price{font-size:12px;font-weight:800;margin-left:3px}
  .fdp-selected.empty{background:var(--card);border:1px dashed var(--line);color:var(--ink-faint);font-weight:500}
  .fdp{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow-sm);padding:10px}
  .fdp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .fdp-mo{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:16px}
  .fdp-nav{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--bg);font-size:15px;cursor:pointer;color:var(--ink)}
  .fdp-nav:disabled{opacity:.3;cursor:default}
  .fdp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .fdp-dow{text-align:center;font-size:10.5px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;padding:2px 0}
  .fdp-cell{position:relative;aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;color:var(--ink)}
  .fdp-cell.past,.fdp-cell.off,.fdp-cell.soon{color:var(--ink-faint);opacity:.35;cursor:default}
  .fdp-cell.off:not(.past),.fdp-cell.soon{cursor:pointer}
  .fdp-cell.today{opacity:1;color:#E6E4E2}
  .fdp-cell.today::before{content:"";position:absolute;width:29px;height:29px;border:1px solid #C7AEB7;border-radius:50%;pointer-events:none}
  .fdp-cell.empty{cursor:default}
  .fdp-cell.sel{background:var(--accent);color:#fff}
  .fdp-cell.rush:not(.sel){color:#6E4A18;background:transparent}
  .fdp-cell.rush:not(.sel)::after{content:"€";position:absolute;left:calc(50% + 8px);top:50%;transform:translateY(-70%);font-size:9px;font-weight:800;line-height:1;color:#A46919;pointer-events:none}
  .fdp-cell.rush.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .tslot{border:1.5px solid var(--line);background:var(--card);border-radius:9px;padding:7px 0;text-align:center;font-size:12.5px;font-weight:600;cursor:pointer;font-variant-numeric:tabular-nums}
  .tslot.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}

  .drop{border:2px dashed #DFCBD0;border-radius:var(--radius);background:var(--card);padding:26px 18px;text-align:center;cursor:pointer}
  .drop:active{transform:scale(.99)}
  .drop.has{border-style:solid;border-color:var(--pistachio);background:linear-gradient(0deg,#F2E2E8,#fff)}
  .drop .big{font-size:30px}
  .drop .t1{font-weight:600;font-size:15px;margin-top:8px}
  .drop .t2{font-size:12.5px;color:var(--ink-soft);margin-top:4px;line-height:1.4}
  .photo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .photo-thumb{position:relative;aspect-ratio:1;border-radius:16px;overflow:hidden;border:1.5px solid var(--pistachio);box-shadow:var(--shadow-sm)}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .photo-rm{position:absolute;top:5px;right:5px;width:24px;height:24px;border-radius:50%;border:none;background:rgba(20,20,20,.6);color:#fff;font-size:16px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
  .photo-add{aspect-ratio:1;border:2px dashed #DFCBD0;border-radius:16px;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-family:inherit;color:var(--ink-soft);padding:6px}
  .photo-add:active{transform:scale(.97)}
  .photo-add .big{font-size:26px;line-height:1;color:var(--accent)}
  .photo-add .t1{font-size:12px;font-weight:600;color:var(--ink)}
  .photo-add .t2{font-size:10.5px;color:var(--ink-soft)}
  .photo-add.need{border-color:var(--brand);background:var(--accent-soft)}
  .photo-add.need .t2{color:var(--brand);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:9.5px}
  .mini-upload{border:1.5px dashed #DFCBD0;border-radius:13px;background:var(--card);padding:11px;text-align:center;cursor:pointer;font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:12px}
  .mini-upload.has{border-style:solid;border-color:var(--pistachio);color:var(--pistachio)}

  /* review */
  /* review card */
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:0 6px 22px rgba(20,20,20,.07);overflow:hidden}
  .rc-for{padding:16px 18px 0;text-align:center}
  .rc-forlbl{display:block;font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint)}
  .rc-name{display:block;font-family:'Playfair Display',Georgia,serif;font-size:26px;font-weight:600;color:var(--brand);line-height:1.2;margin-top:3px}
  .rc-hero{padding:13px 18px 15px;border-bottom:1px solid var(--line)}
  .rc-summary{display:flex;flex-direction:column;gap:0;background:transparent;border:none;border-radius:0;padding:0}
  .rc-spec{display:grid;grid-template-columns:58px 1fr;align-items:baseline;gap:8px;padding:7px 0;border-bottom:1px dashed #DED7D1}
  .rc-spec:last-child{border-bottom:none}
  .rc-sk{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-faint)}
  .rc-sv{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.3}
  .rc-sv em{display:inline;font-style:normal;font-size:10.5px;font-weight:500;color:var(--ink-soft);margin-left:5px}
  .rc-body{padding:4px 18px 8px}
  .rsec{padding:13px 0;border-bottom:1px solid var(--line)}
  .rsec:last-child{border-bottom:none}
  .rlab{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
  .rchips{display:flex;flex-wrap:wrap;gap:6px}
  .rchip{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--ink);
    background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:5px 10px}
  .rchip i{width:11px;height:11px;border-radius:50%;border:1px solid rgba(0,0,0,.12);display:inline-block;flex:0 0 auto}
  .rchip.plain{color:var(--brand);background:var(--accent-soft);border-color:transparent}
  .rquote{display:flex;flex-direction:column;gap:3px}
  .rq-text{font-family:'Playfair Display',Georgia,serif;font-size:19px;font-weight:600;line-height:1.3;word-break:break-word}
  .rq-meta{font-size:11.5px;color:var(--ink-faint);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .rq-col{display:inline-flex;align-items:center;gap:4px;font-weight:600;color:var(--ink-soft)}
  .rq-col i{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.15);display:inline-block}
  .rlines{display:flex;flex-direction:column;gap:6px}
  .rline{font-size:13.5px;font-weight:500;color:var(--ink)}
  .rpick{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .rp-d{font-size:15px;font-weight:700;color:var(--ink)}
  .rp-t{font-size:15px;font-weight:700;color:var(--brand);font-variant-numeric:tabular-nums}
  .rcour{display:flex;flex-direction:column;gap:4px;margin-top:11px;padding:10px 12px;background:var(--bg);border:1px solid var(--line);border-radius:12px}
  .rc-cline{font-size:13px;font-weight:700;color:var(--ink)}
  .rc-cnote{font-size:11.5px;line-height:1.45;color:var(--ink-soft)}
  .receipt{margin:5px 0 13px;padding:9px 8px 8px;background:#fff;border:1px solid #D2D2CD;border-radius:0;color:#202020;
    font-family:ui-monospace,'SFMono-Regular',Menlo,Monaco,Consolas,'Liberation Mono',monospace;box-shadow:none}
  .receipt-head{font-family:inherit;font-size:12px;font-weight:700;color:#202020;margin:1px 4px 7px;text-align:center;text-transform:uppercase;letter-spacing:.04em}
  .receipt-row{display:grid;grid-template-columns:auto minmax(10px,1fr) auto;align-items:end;gap:5px;margin:0;padding:6px 6px;font-size:11px;line-height:1.25}
  .receipt-row:nth-child(even){background:#F7F7F5}
  .receipt-row:nth-child(odd){background:#FFFFFF}
  .receipt-name{min-width:0;color:#202020;font-weight:500}
  .receipt-dots{border-bottom:1px dotted #AFAFA9;transform:translateY(-3px)}
  .receipt-price{color:#111;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .receipt-price.free,.receipt-price.quote{color:#111}
  .receipt-price.quote{font-size:10px}
  .rc-total{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:#EEEAE5;border:1.5px solid #B8B0A8;border-top:1.5px dashed #8F867E;padding:16px 18px;box-shadow:inset 0 3px 8px rgba(74,68,70,.035)}
  .rc-tl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .rc-tv{font-family:'Montserrat',system-ui,sans-serif;font-size:24px;font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .rsec.before-receipt{border-bottom:0}
  .review-note{display:grid!important;grid-template-columns:26px minmax(0,1fr);align-items:start;gap:10px;background:#FFF5DC!important;border:1.5px solid #D3AE58!important;color:#473616!important;font-weight:500;line-height:1.55;padding:13px 14px!important}
  .review-note-icon{display:grid;place-items:center;width:24px;height:24px;border:1.5px solid #8A6416;border-radius:50%;color:#704E0B;font-size:14px;font-weight:800;line-height:1}
  .rtotal .v{font-family:'Playfair Display',Georgia,serif;font-size:22px}

  #lang{position:absolute;inset:0;background:linear-gradient(160deg,#F7F6F3,#F2E2E8);z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center}
  #lang .logo{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:15px;color:var(--accent);margin-bottom:auto;margin-top:24px}
  #lang .logoimg{width:300px;max-width:84%;height:auto;margin:0 auto 26px;display:block}
  #lang h1#langTitle,#lang h1{transition:opacity .5s ease}
  #lang .cake{font-size:58px;margin-bottom:16px;filter:drop-shadow(0 10px 18px rgba(115,8,44,.2))}
  #lang h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:31px;line-height:1.1;margin:0 0 8px;letter-spacing:-.02em;color:var(--brand)}
  #lang p{color:var(--ink-soft);font-size:14.5px;margin:0 0 28px;line-height:1.5;max-width:260px}
  #lang .langbtns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin:16px auto 0}
  .langbtn{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:15px;font-family:inherit;font-size:16px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm);display:flex;align-items:center;justify-content:center;gap:11px;transition:transform .15s,border-color .15s}
  .langbtn:active{transform:scale(.97);border-color:var(--accent)}
  .langbtn .badge{font-size:12px;font-weight:700;letter-spacing:.06em;background:var(--brand);color:#fff;border-radius:7px;padding:3px 7px}

  #foot{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(22px + env(safe-area-inset-bottom));
    background:linear-gradient(0deg,var(--bg) 62%,transparent);z-index:30}
  #next{width:100%;border:none;border-radius:16px;background:var(--accent);color:#fff;font-family:inherit;
    font-weight:600;font-size:16.5px;padding:16px;cursor:pointer;box-shadow:0 8px 22px rgba(115,8,44,.28);transition:transform .15s,opacity .15s}
  #next:active{transform:scale(.98)}
  #next:disabled{opacity:.4;box-shadow:none}
  #next.off{opacity:.42;box-shadow:none}
  #next.pist{background:var(--pistachio);box-shadow:0 8px 22px rgba(143,166,124,.32)}
  #next.shake{animation:shk .4s}
  @keyframes shk{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-4px)}}
  /* missing-field hints */
  #errToast{display:none;background:#FBEAEA;border:1px solid #EFC9C9;border-radius:13px;padding:9px 12px;margin-bottom:9px;
    flex-direction:column;gap:3px;animation:accIn .22s ease}
  #errToast.show{display:flex}
  #errToast span{font-size:12.5px;font-weight:600;color:#9B2C2C;line-height:1.35;display:flex;gap:6px}
  #errToast span:before{content:"!";flex:0 0 auto;width:14px;height:14px;border-radius:50%;background:#9B2C2C;color:#fff;
    font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
  .err{position:relative}
  .field.err input,.field.err textarea,.err>.ig-wrap input{border-color:#D66A6A !important;background:#FEF7F7}
  .sw-grid.err,.shape-row.err,.photo-grid.err,.time-grid.err,.fdp.err,.opts.err,.acc.err,.flavour-group.err{
    outline:2px solid #E9A9A9;outline-offset:5px;border-radius:14px}
  .opt.err{border-color:#D66A6A !important}

  .modal{position:absolute;inset:0;z-index:60;background:rgba(20,20,20,.45);display:none;align-items:flex-end;justify-content:center;padding:0}
  .modal.show{display:flex}
  .modal-card{background:var(--bg);width:100%;max-height:88%;border-radius:24px 24px 0 0;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(20,20,20,.28);animation:sheetUp .3s cubic-bezier(.4,0,.2,1)}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px;flex:0 0 auto}
  .modal-title{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:20px;color:var(--brand)}
  .modal-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:19px;color:var(--ink);cursor:pointer;line-height:1;flex:0 0 auto}
  .modal-body{overflow-y:auto;padding:4px 20px 26px;-webkit-overflow-scrolling:touch}
  .modal-body::-webkit-scrollbar{display:none}
  .modal-body h4{font-family:'Playfair Display',Georgia,serif;font-size:14.5px;font-weight:600;color:var(--accent);margin:16px 0 4px}
  .modal-body p{font-size:13px;line-height:1.55;color:var(--ink-soft);margin:0 0 6px}
  .modal-body .muted{font-size:11.5px;color:var(--ink-faint)}
  #done{position:absolute;inset:0;background:linear-gradient(160deg,#F7F6F3,#F2E2E8);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 30px;text-align:center}
  #done.show{display:flex}
  #done .big{font-size:62px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.56,.64,1)}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
  #done h1{font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:29px;margin:0 0 10px}
  #done p{color:var(--ink-soft);font-size:15px;line-height:1.55;max-width:280px;margin:0 0 8px}
  #done .again{margin-top:24px;background:none;border:1.5px solid var(--line);border-radius:14px;padding:12px 22px;font-family:inherit;font-weight:600;color:var(--ink);cursor:pointer}
  #survey{margin-top:26px;width:100%;max-width:320px}
  #survey #surveyQ{font-size:13px;font-weight:600;color:var(--ink);margin:0 0 12px}
  .fb-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .fb-btn{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:11px 3px 9px;cursor:pointer;
    font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s,border-color .12s,background .12s}
  .fb-btn .em{font-size:21px;line-height:1}
  .fb-btn .lb{font-size:10.5px;font-weight:600;color:var(--ink-soft);line-height:1.15;text-align:center}
  .fb-btn:active{transform:scale(.94)}
  .fb-btn.sel{border-color:var(--brand);background:var(--accent-soft)}
  .fb-btn.sel .lb{color:var(--brand)}
  .fb-row.locked .fb-btn{pointer-events:none}
  .fb-row.locked .fb-btn:not(.sel){opacity:.45}
  .fb-thanks{font-size:13px;color:var(--brand);font-weight:600;margin:12px 0 0}
  .fb-error{font-size:11.5px;line-height:1.45;color:#9b2635;margin:10px 0 0;text-align:center}
  #survey.sent{background:var(--accent-soft);border-radius:16px;padding:14px 16px;margin-top:26px;animation:accIn .3s ease}
  #survey.sent .fb-thanks{margin:0;display:flex;align-items:center;justify-content:center;gap:8px}
  #survey .fb-em{font-size:19px}
</style>
</head>

/* ---------- SVG icons ---------- */
function sizeCakeTwoTier(lvl){
  /* lvl 4 = S+M, lvl 5 = M+L — bottom tier wider, top tier stacked */
  const bW=lvl>=5?46:40, bH=lvl>=5?20:17;
  const tW=lvl>=5?30:25, tH=lvl>=5?15:13;
  const col="#8A2340", top="#A33F5C";
  const yB=46, yBT=yB-bH;           /* bottom tier top edge */
  const yTB=yBT, yTT=yTB-tH;        /* top tier sits on bottom tier */
  const bx=(52-bW)/2, tx=(52-tW)/2;
  return `<svg width="52" height="52" viewBox="0 0 52 52">
    <ellipse cx="26" cy="${yB+2}" rx="${bW/2}" ry="2.5" fill="rgba(0,0,0,.06)"/>
    <rect x="${bx}" y="${yBT}" width="${bW}" height="${bH}" rx="5" fill="${col}"/>
    <rect x="${bx}" y="${yBT}" width="${bW}" height="6" rx="3" fill="${top}"/>
    <rect x="${tx}" y="${yTT}" width="${tW}" height="${tH}" rx="4" fill="${col}"/>
    <rect x="${tx}" y="${yTT}" width="${tW}" height="5" rx="2.5" fill="${top}"/>
    <circle cx="26" cy="${yTT-3}" r="2.4" fill="#73082C"/></svg>`;
}

  const W=[24,30,36,42,48][level-1], H=[14,18,24,32,40][level-1];

  pdate:"",ptime:"",courier:false,heard:null,referredBy:"",email:"",emailOptIn:false,agreed:false});

const isBento=()=>S.size==='XS';
const sizeOpt=()=>D.size.opts.find(o=>o.id===S.size);
const isCustomQuote=()=>{const o=sizeOpt();return !!o&&o.price==null;};
const allFlav=()=>isBento()?D.flavBento:D.flavCustom.flatMap(g=>g.items);
const bigSize=()=>(S.size==='L'||S.size==='XL');
/* size-dependent surcharges */
function shapePrice(id){
  if(id==='round')return 0;
  if(id==='heart'||id==='square')return bigSize()?8:5;
  if(id==='rect')return bigSize()?10:8;
  return 0;
}
function sigPrice(){ if(S.size==='XL')return 10; if(S.size==='L')return 8; return 6; }
function flavPrice(o){ return o&&o.sig?sigPrice():(o&&o.price?o.price:0); }
function writeMethodPrice(id){
  if(id==='fondant')return bigSize()?6:5;
  if(id==='cutout')return bigSize()?10:8;
  return 0;
}
function decorPrice(o){ if(!o||o.quote)return null; if(o.fixed)return o.fixed; return bigSize()?o.lxl:o.sm; }
function dayNumberFromISO(iso){
  const p=String(iso||'').split('-').map(Number);return p.length===3?Date.UTC(p[0],p[1]-1,p[2])/86400000:NaN;
}
function todayDayNumber(){const d=new Date();return Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/86400000;}
function daysUntilPickup(iso){const n=dayNumberFromISO(iso);return Number.isFinite(n)?Math.round(n-todayDayNumber()):null;}
function rushSurcharge(){return daysUntilPickup(S.pdate)===3?(S.size==='XS'?10:20):0;}

/* ---------- Price ---------- */
function calc(){
  const rush=rushSurcharge();
  if(isCustomQuote())return{custom:true,rush};
  let sum=0,range=false;
  const sz=sizeOpt(); if(sz&&sz.price!=null)sum+=sz.price;
  const sh=(isBento()?D.shapeBento:D.shapeCustom).find(o=>o.id===S.shape); if(sh)sum+=shapePrice(sh.id);
  const fl=allFlav().find(o=>o.id===S.flavor); if(fl)sum+=flavPrice(fl);
  if(S.colors.length>2)sum+=(S.colors.length-2)*5;
  const cup=D.cupcakes.find(o=>o.id===S.cupcakes); if(cup)sum+=cup.price;
  if(S.pigment.length){const pp=bigSize()?7:5;sum+=S.pigment.length*pp;}
  S.writeMethods.filter(id=>id!=='none').forEach(id=>sum+=writeMethodPrice(id));
  const dc=S.decor.filter(d=>d!=='none');
  dc.forEach(id=>{const o=D.decor.find(x=>x.id===id);
    if(!o)return;
    if(o.quote){range=true;return;}
    const p=decorPrice(o); if(p)sum+=p;});
  sum+=rush;
  return{sum,range,rush};
}
const priceNow=()=>{const c=calc();return c.custom?0:c.sum;};
function renderCart(){
  const cart=document.getElementById('cart');
  /* on the review step the total is already in the card — show encouragement instead */
  if(STEPS[step]==='review'){
    cart.classList.add('almost');
    cart.innerHTML=`<span>✨</span><span class="amt">${lang==='en'?'Almost done':'Quase pronto'}</span>`;
    return;
  }
  cart.classList.remove('almost');
  cart.innerHTML=`<span>🛒</span><span><span class="pre" id="cartPre"></span><span class="amt" id="cartAmt">€0</span></span>`;
  const c=calc(),amt=document.getElementById('cartAmt'),pre=document.getElementById('cartPre');
  if(!S.size){amt.textContent='€0';pre.textContent='';return;}
  if(c.custom){amt.textContent=t('quote');pre.textContent='';return;}
  pre.textContent=c.range?'from ':t('est')+' ';
  amt.textContent='€'+c.sum;
}
function sparkleBump(el){
  const cart=document.getElementById('cart');
  cart.classList.remove('bump');void cart.offsetWidth;cart.classList.add('bump');
  const r=el?el.getBoundingClientRect():{right:300,top:90};
  const s=document.createElement('div');s.className='spark';s.textContent='✨';
  s.style.left=r.right+'px';s.style.top=r.top+'px';
  s.style.setProperty('--dx',(30+Math.random()*30)+'px');
  s.style.setProperty('--dy',(-28-Math.random()*18)+'px');
  document.getElementById('phone').appendChild(s);setTimeout(()=>s.remove(),700);
}
/* Wrap a state change: animate cart only if the total actually increased */
function change(el,fn){const before=priceNow();fn();const after=priceNow();renderCart();if(after>before)sparkleBump(el);}

const tick=()=>`<svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-6" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
function bindSingle(field,after){
  B().querySelectorAll('.opt').forEach(el=>el.onclick=()=>{
    change(el,()=>{S[field]=el.dataset.id;if(after)after();});
    B().querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel');
    validate();
  });
}
function bindMulti(field,after){
  B().querySelectorAll('.opt.multi[data-id]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.id;
    change(el,()=>{const i=S[field].indexOf(id);if(i>=0)S[field].splice(i,1);else S[field].push(id);});
    el.classList.toggle('sel');if(after)after();
  });
}
function bindSwatchMulti(field,max,pcId){

/* ---------- validation ---------- */
/* what's still missing on this step — drives both the Continue state and the error hints */
let errorToastTimer=null;
function armToastTimer(){
  if(errorToastTimer)clearTimeout(errorToastTimer);
  errorToastTimer=setTimeout(()=>{
    errorToastTimer=null;
    document.querySelectorAll('.err').forEach(e=>e.classList.remove('err'));
    const t=document.getElementById('errToast');if(t)t.classList.remove('show');
  },2000);
}
function missing(){
  const k=STEPS[step];const M=[];
  const add=(msg,sel)=>M.push({msg,sel});
  if(k==='size'){
    if(!S.size)add(lang==='en'?'Choose a cake size':'Escolha o tamanho do bolo','.opts');
    else if(!S.shape)add(lang==='en'?'Choose a cake shape':'Escolha a forma do bolo','.shape-row');
  }
  else if(k==='flavor'){if(!S.flavor)add(lang==='en'?'Choose a flavour':'Escolha um sabor','.flavour-group');}
  else if(k==='color'){if(!S.colors.length)add(lang==='en'?'Choose at least one colour':'Escolha pelo menos uma cor','.sw-grid');}
  else if(k==='writing'){
    if(!S.writeMethods.length)add(lang==='en'?'Choose how your message should be written — or tap None':'Escolha como aplicar a mensagem — ou toque em Nenhuma','.opts');
    else if(S.writeMethods.some(m=>m!=='none')){
      if(!S.writing.trim())add(lang==='en'?'Type your message':'Escreva a sua mensagem','#writing');
      if(!S.writingColor)add(lang==='en'?'Choose a colour for your message':'Escolha uma cor para a mensagem','.sw-grid');
    }
  }
  else if(k==='photo'){if(!S.photo)add(lang==='en'?'Add at least 1 inspiration photo':'Adicione pelo menos 1 foto de inspiração','.photo-grid');}
  else if(k==='allergies'){if(!(S.noAllergy||S.allergies.trim()))add(lang==='en'?'List any allergies, or tap the button below':'Indique as alergias, ou toque no botão abaixo','#allergies');}
  else if(k==='contact'){
    if(!S.name.trim())add(lang==='en'?'Enter your full name':'Indique o seu nome completo','#name');
    if(S.wnum.trim().length<=3)add(lang==='en'?'Enter your WhatsApp number':'Indique o seu número de WhatsApp','#wnum');
  }
  else if(k==='pickup'){
    if(!S.pdate)add(lang==='en'?'Choose a pick-up date':'Escolha a data de levantamento','.fdp');
    if(!S.ptime)add(lang==='en'?'Choose a pick-up time':'Escolha a hora de levantamento','.time-grid');
  }
  else if(k==='heard'){if(!S.heard)add(lang==='en'?'Let me know how you found me':'Diga-me como me encontrou','.opts');}
  else if(k==='policies'){if(!S.agreed)add(lang==='en'?'Please accept the booking terms to continue':'Aceite os termos para continuar','#agree');}
  else if(k==='email'){
    if(S.emailOptIn){
      const v=S.email.trim();
      if(!v)add(lang==='en'?'Enter your email to receive updates':'Indique o seu email para receber atualizações','#email');
      else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v))add(lang==='en'?'That email address doesn\'t look right':'Esse endereço de email não parece correto','#email');
    }
  }
  return M;
}
function validate(){
  const M=missing();
  const ok=M.length===0;
  const n=document.getElementById('next');
  n.classList.toggle('off',!ok);   /* looks inactive but stays clickable so we can explain why */
  const t=document.getElementById('errToast');
  if(ok)clearErrors();
  else if(t&&t.classList.contains('show'))paintErrors(M);  /* keep the list honest as they fix things */
  return ok;
}
function paintErrors(M){
  document.querySelectorAll('.err').forEach(e=>e.classList.remove('err'));
  M.forEach(m=>{const el=B().querySelector(m.sel);if(!el)return;(el.closest('.field')||el).classList.add('err');});
  const t=document.getElementById('errToast');
  t.innerHTML=M.map(m=>`<span>${m.msg}</span>`).join('');
  t.classList.add('show');
  armToastTimer();
}
function showToastMessage(msg){
  document.querySelectorAll('.err').forEach(e=>e.classList.remove('err'));
  const t=document.getElementById('errToast');if(!t)return;
  t.innerHTML=`<span>${msg}</span>`;
  t.classList.add('show');
  armToastTimer();
}
function clearErrors(){
  document.querySelectorAll('.err').forEach(e=>e.classList.remove('err'));
  const t=document.getElementById('errToast'); if(t)t.classList.remove('show');
  if(errorToastTimer){clearTimeout(errorToastTimer);errorToastTimer=null;}
}
function showMissing(){
  const M=missing(); if(!M.length)return;
  paintErrors(M);
  const first=B().querySelector(M[0].sel);
  if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
  if(first&&/^(INPUT|TEXTAREA)$/.test(first.tagName))setTimeout(()=>first.focus(),320);
  const n=document.getElementById('next');
  n.classList.remove('shake');void n.offsetWidth;n.classList.add('shake');
}

  photo_urls=photo_urls||[];
  const primaryPhoto=photo_urls[0]||null;
  let photoNote=S.photoNote||"";
  if(photo_urls.length>1){
    const extra=photo_urls.slice(1).join("  |  ");
    photoNote=(photoNote?photoNote+"\n\n":"")+"Additional reference photos: "+extra;
  }
  const so=D.size.opts.find(o=>o.id===S.size);
  const portions=so?so.d.en.replace(' portions','').replace(' porções',''):'';
  const sizeStr=so?`${so.id}${portions?` (${portions})`:''}`:S.size;
  const sh=(isBento()?D.shapeBento:D.shapeCustom).find(o=>o.id===S.shape);
  const fl=allFlav().find(o=>o.id===S.flavor);
  const colorsArr=S.colors.map(h=>{const o=D.colors.find(x=>x.h===h);return [o?o.t.en:h,h];});
  const pigArr=S.pigment.map(id=>{const o=D.pigment.find(x=>x.id===id);return o?o.t.en:id;});
  const dsel=S.decor.filter(d=>d!=='none');
  const decorArr=dsel.length?dsel.map(id=>{const o=D.decor.find(x=>x.id===id);return o?o.t.en:id;}):["No decoration"];
  const cup=D.cupcakes.find(o=>o.id===S.cupcakes);
  const wm=S.writeMethods.filter(id=>id!=='none').map(id=>{const o=D.writeMethods.find(x=>x.id===id);return o?o.t.en:id;});
  const wc=S.writingColor?((D.colors.find(x=>x.h===S.writingColor)||{}).t?.en||S.writingColor):"";
  const hrd=(D.heard.find(o=>o.id===S.heard)||{}).t?.en||S.heard;
  /* Courier request is appended to notes so no DB column is required.
     If a `courier` boolean column is added later, send S.courier directly. */
  let notesOut=S.notes||"";
  if(S.courier){
    notesOut=(notesOut?notesOut+"\n\n":"")+"COURIER: Customer would like to arrange a Bolt/Uber courier.";
  }
  const c=calc();
  if(c.rush){
    notesOut=(notesOut?notesOut+"\n\n":"")+`RUSH ORDER SURCHARGE: +€${c.rush} for pickup on ${S.pdate}.`;
  }
  return {
    status:"new", is_read:false, paid:0,
    language:lang.toUpperCase(),
    cake_type:isBento()?"Bento":"Custom",
    size:sizeStr, shape:sh?sh.t.en:S.shape, flavor:fl?fl.t.en:S.flavor,
    colors:colorsArr, pigment:pigArr, write_methods:wm,
    writing:S.writing, writing_color:wc,
    cupcakes:cup?cup.t.en:S.cupcakes, decor:decorArr, candles:S.candles==='yes'?"Yes":"No",
    photo_url:primaryPhoto, photo_note:photoNote,
    no_allergy:S.noAllergy, allergies:S.noAllergy?"":S.allergies, notes:notesOut,
    name:S.name, whatsapp:(S.wcode+" "+S.wnum).trim(), instagram:S.instagram,
    pickup_date:S.pdate||null, pickup_time:S.ptime,
    heard:hrd, referred_by:S.referredBy, email:S.email, email_opt_in:S.emailOptIn,
    price:c.custom?null:c.sum, price_range:c.custom?false:!!c.range, agreed:S.agreed
  };
}

async function submit(){
  const btn=document.getElementById('next');
  btn.disabled=true; btn.textContent=lang==='en'?'Sending…':'A enviar…';
  try{
    if(!sb) throw new Error("Connection not ready. Please refresh and try again.");
    let photo_urls=[];
    for(const f of S.photoFiles.slice(0,3)){
      const ext=(f.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')||'jpg';
      const path=`orders/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
      const up=await sb.storage.from('references').upload(path,f,{cacheControl:'3600',upsert:false});
      if(up.error) throw up.error;
      photo_urls.push(sb.storage.from('references').getPublicUrl(path).data.publicUrl);
    }
    /* A private submission token lets the optional survey attach after submit. */
    const payload=buildPayload(photo_urls);
    lastSubmissionToken=(window.crypto&&window.crypto.randomUUID)?window.crypto.randomUUID():fallbackUuid();
    payload.submission_token=lastSubmissionToken;
    let {error}=await sb.from('orders').insert(payload);
    /* Backward-compatible safety: orders must still submit before the migration is installed. */
    if(error&&(error.code==='PGRST204'||/submission_token/i.test(error.message||''))){
      delete payload.submission_token;lastSubmissionToken=null;
      ({error}=await sb.from('orders').insert(payload));
    }
    if(error)throw error;
    formAnalyticsSubmitted=true;
    trackFormEvent('form_submitted',{step_number:STEPS.length,step_name:'review',duration_seconds:formDuration()},true);
    showDone();
  }catch(e){
    btn.disabled=false; btn.textContent=t('send');
    alert((lang==='en'
      ?"Sorry — something went wrong sending your order. Please try again.\n\n"
      :"Ocorreu um erro ao enviar o pedido. Tente novamente.\n\n")+(e.message||e));
  }
}

const MAIN_PAGE_URL='index.html';
const FEEDBACK=[
  {id:'poor',em:'😞',t:lg('Poor','Fraca')},
  {id:'average',em:'😐',t:lg('Average','Razoável')},
  {id:'good',em:'🙂',t:lg('Good','Boa')},
  {id:'excellent',em:'🤩',t:lg('Excellent','Excelente')},
];
let lastSubmissionToken=null;
function fallbackUuid(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=Math.random()*16|0,v=c==='x'?r:(r&3|8);return v.toString(16);});}

function showDone(){
  const d=document.getElementById('done');const fn=(S.name.split(' ')[0]||'');
  document.getElementById('doneH').textContent=lang==='en'?'Order sent! 🎂':'Pedido enviado! 🎂';
  document.getElementById('doneP').textContent=lang==='en'
    ?`Thanks ${fn}! I will check availability and send your quote by WhatsApp (Sun–Wed until 12:00).`
    :`Obrigada ${fn}! Vou confirmar a disponibilidade e enviar-lhe o orçamento por WhatsApp (Dom–Qua até às 12:00).`;
  document.getElementById('doneP2').textContent=lang==='en'?'Your date is secured after the 50% deposit.':'A sua data fica reservada após o sinal de 50%.';
  document.getElementById('surveyQ').textContent=lang==='en'?'How was your ordering experience?':'Como foi a sua experiência de encomenda?';
  document.getElementById('fbRow').innerHTML=FEEDBACK.map(f=>
    `<button type="button" class="fb-btn" data-fb="${f.id}"><span class="em">${f.em}</span><span class="lb">${f.t[lang]}</span></button>`).join('');
  document.getElementById('fbRow').querySelectorAll('[data-fb]').forEach(b=>b.onclick=()=>sendFeedback(b.dataset.fb,b));
  if(!lastSubmissionToken){
    document.getElementById('fbRow').innerHTML='';
    document.getElementById('surveyQ').textContent=lang==='en'
      ?'The order was sent, but the optional survey is temporarily unavailable.'
      :'O pedido foi enviado, mas o questionário opcional está temporariamente indisponível.';
  }
  const home=document.getElementById('doneHome');
  home.textContent=lang==='en'?'Back to main page':'Voltar à página principal';
  home.onclick=goHome;
  d.classList.add('show');
}

async function sendFeedback(id,btn){
  const label=(FEEDBACK.find(f=>f.id===id)||{}).t?.en||id;
  const em=(FEEDBACK.find(f=>f.id===id)||{}).em||'';
  const sv=document.getElementById('survey');
  const row=document.getElementById('fbRow');
  row.classList.add('locked');btn.classList.add('sel');
  row.querySelectorAll('button').forEach(b=>b.disabled=true);
  const previousError=sv.querySelector('.fb-error');if(previousError)previousError.remove();
  try{
    if(!sb||!lastSubmissionToken)throw new Error('Feedback connection is unavailable');
    const {data,error}=await sb.rpc('submit_order_feedback',{
      p_submission_token:lastSubmissionToken,
      p_feedback:label
    });
    if(error)throw error;
    if(data!==true)throw new Error('The feedback could not be attached to this order');
    sv.classList.add('sent');
    sv.innerHTML=`<p class="fb-thanks"><span class="fb-em">${em}</span>${lang==='en'?'Thank you for sharing your feedback':'Obrigada por partilhar o seu feedback'}</p>`;
  }catch(e){
    row.classList.remove('locked');btn.classList.remove('sel');
    row.querySelectorAll('button').forEach(b=>b.disabled=false);
    const msg=document.createElement('p');msg.className='fb-error';
    msg.textContent=lang==='en'
      ?'Your rating could not be saved. Please check your connection and tap again.'
      :'Não foi possível guardar a sua avaliação. Verifique a ligação e tente novamente.';
    sv.appendChild(msg);
    console.error('Feedback submission failed',e);
  }
}
