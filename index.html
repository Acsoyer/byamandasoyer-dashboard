<html lang="en">
<head>

<link rel="icon" type="image/png" sizes="32x32" href="https://ivnybivjjydihltknlmo.supabase.co/storage/v1/object/public/references/icons-dashboard/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="https://ivnybivjjydihltknlmo.supabase.co/storage/v1/object/public/references/icons-dashboard/favicon-48x48.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://ivnybivjjydihltknlmo.supabase.co/storage/v1/object/public/references/icons-dashboard/apple-touch-icon.png">

<style>
  :root{
    --bg:#F7F1EA; --card:#FFFFFF; --ink:#43212E; --ink-soft:#8A6B76; --ink-faint:#B39CA5;
    --line:#ECE0D7; --accent:#8C1D3A; --accent2:#D14D72; --accent-soft:#FBE7EC;
    --new:#D14D72; --quoted:#C98A2E; --confirmed:#6E9B5B; --delivered:#46765F; --done:#9A8C93; --cancel:#B26B6B;
    --paid:#6E9B5B; --deposit:#C98A2E; --unpaid:#B39CA5;
    --shadow:0 2px 12px rgba(67,33,46,.08); --shadow-lg:0 12px 40px rgba(67,33,46,.16);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);font-family:'Instrument Sans',system-ui,sans-serif;color:var(--ink)}

  /* Login */
  #login{position:fixed;inset:0;background:linear-gradient(160deg,#F7F1EA,#F1E2D8);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:100}
  #login img{width:290px;max-width:80%;margin-bottom:26px}
  #login .box{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:22px;width:100%;max-width:340px}
  #login h2{font-family:'Fraunces',serif;font-weight:600;font-size:18px;margin:0 0 14px;text-align:center}
  #login input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;font-size:16px;font-family:inherit;outline:none;margin-bottom:12px}
  #login input:focus{border-color:var(--accent)}
  #login button{width:100%;border:none;border-radius:13px;background:var(--accent);color:#fff;font-family:inherit;font-weight:600;font-size:15px;padding:13px;cursor:pointer}
  #login .err{color:var(--cancel);font-size:13px;margin:2px 0 12px;display:none}
  #login .hint{font-size:12px;color:var(--ink-faint);text-align:center;margin-top:14px}

  #app{display:none;max-width:860px;margin:0 auto;padding:0 16px 90px}
  header{position:sticky;top:0;background:rgba(247,241,234,.92);backdrop-filter:blur(10px);z-index:20;padding:14px 0 0;border-bottom:1px solid var(--line)}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{height:34px}
  .brand .dt{color:var(--ink-soft);font-size:13px}
  .logout{background:none;border:1px solid var(--line);border-radius:10px;padding:7px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}

  /* view tabs */
  .tabs{display:flex;gap:4px;background:#EFE3DA;border-radius:12px;padding:4px}
  .tab{flex:1;text-align:center;padding:9px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer;transition:all .15s}
  .tab.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}

  .ordersUI{padding-bottom:10px}
  .search{width:100%;border:1.5px solid var(--line);border-radius:12px;background:var(--card);padding:11px 14px;font-size:15px;font-family:inherit;outline:none;margin-top:12px}
  .search:focus{border-color:var(--accent)}
  .buckets{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
  .buckets::-webkit-scrollbar{display:none}
  .bpill{flex:0 0 auto;border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--ink-soft);transition:all .15s}
  .bpill.active{background:var(--ink);color:#fff;border-color:var(--ink)}
  .bpill .n{font-variant-numeric:tabular-nums;opacity:.65}
  .bpill .badge{background:var(--accent2);color:#fff;border-radius:99px;min-width:16px;height:16px;padding:0 4px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .statusrow{display:flex;gap:6px;overflow-x:auto;padding:9px 0 4px;scrollbar-width:none}
  .statusrow::-webkit-scrollbar{display:none}
  .schip{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:99px;padding:5px 10px;font-size:12px;font-weight:600;color:var(--ink-soft);cursor:pointer}
  .schip.active{background:var(--accent-soft);border-color:var(--accent2);color:var(--accent)}

  #main{padding-top:14px}
  .ghead{font-family:'Fraunces',serif;font-weight:600;font-size:15px;color:var(--ink-soft);margin:20px 2px 10px;display:flex;align-items:center;gap:9px}
  .ghead .ln{flex:1;height:1px;background:var(--line)}

  .ocard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:14px 15px 14px 17px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s}
  .ocard:active{transform:scale(.995)}
  .ocard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--st)}
  .oc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .oc-name{font-weight:600;font-size:16px;display:flex;align-items:center;gap:8px}
  .oc-name .dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);flex:0 0 auto}
  .ocard:not(.unread) .oc-name{font-weight:500}
  .ocard:not(.unread) .oc-name .dot{display:none}
  .oc-price{font-family:'Fraunces',serif;font-weight:600;font-size:15px;white-space:nowrap}
  .oc-meta{color:var(--ink-soft);font-size:13px;margin-top:3px}
  .oc-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
  .oc-date{font-size:13px;font-weight:600}
  .oc-date.over{color:var(--cancel)}
  .oc-date .rel{color:var(--ink-faint);font-weight:500;margin-left:5px}
  .chips{display:flex;gap:6px;align-items:center}
  .chip{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:4px 9px;border-radius:99px;color:#fff}
  .paychip{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:99px;border:1.5px solid}
  .fbchip{font-size:13px;line-height:1;padding:2px 1px}
  .empty{text-align:center;color:var(--ink-faint);padding:50px 20px;font-size:14px}
  .blchip{font-size:10.5px;font-weight:700;color:#fff;background:var(--cancel);padding:2px 7px;border-radius:99px;margin-left:2px}
  .blbtn{width:100%;margin-top:10px;border-radius:12px;padding:11px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;border:1.5px solid var(--cancel);background:none;color:var(--cancel)}
  .delbtn{width:100%;margin-top:10px;border-radius:12px;padding:11px;font-family:inherit;font-weight:600;font-size:14px;
    cursor:pointer;border:1.5px solid transparent;background:#F4E7E7;color:#A32020}
  .delbtn.confirm{background:#A32020;color:#fff;border-color:#A32020}
  .fbbox{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px}
  .fbbox .fbem{font-size:24px;line-height:1}
  .fbbox b{font-size:15px;font-weight:700;display:block;color:var(--ink)}
  .fbbox .fbcap{font-size:11.5px;color:var(--ink-faint)}
  .fbbox.excellent,.fbbox.good{border-color:var(--paid)}
  .fbbox.poor{border-color:var(--cancel)}
  .blbtn.on{background:var(--cancel);color:#fff;border-color:transparent}

  /* stats */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:6px}
  .statcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:16px}
  .statcard .num{font-family:'Fraunces',serif;font-weight:600;font-size:28px;line-height:1}
  .statcard .cap{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
  .statcard.wide{grid-column:1/-1}
  .barrow{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:13px}
  .barrow .bname{flex:0 0 128px;font-weight:600}
  .barrow .btrack{flex:1;height:9px;background:var(--line);border-radius:99px;overflow:hidden}
  .barrow .bfill{height:100%;background:linear-gradient(90deg,#E28AA3,var(--accent2));border-radius:99px}
  .barrow .bval{flex:0 0 auto;color:var(--ink-soft);font-variant-numeric:tabular-nums}

  /* calendar */
  .calhead{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px}
  .calhead .mo{font-family:'Fraunces',serif;font-weight:600;font-size:18px}
  .calnav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-size:16px;cursor:pointer;color:var(--ink)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .caldow{text-align:center;font-size:11px;font-weight:700;color:var(--ink-faint);text-transform:uppercase;padding:4px 0}
  .calcell{aspect-ratio:1;border:1px solid var(--line);background:var(--card);border-radius:11px;padding:5px;cursor:pointer;position:relative;display:flex;flex-direction:column}
  .calcell.empty{background:transparent;border:none;cursor:default}
  .calcell.today{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
  .calcell.sel{background:var(--ink);color:#fff}
  .calcell .d{font-size:12px;font-weight:600}
  .calcell .dots{display:flex;flex-wrap:wrap;gap:2px;margin-top:auto}
  .calcell .cdot{width:6px;height:6px;border-radius:50%}
  .calcell .more{font-size:9px;color:var(--ink-faint)}
  .calsel{margin-top:16px}

  /* my info */
  .inforow{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px;margin-bottom:10px}
  .inforow .k{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:5px}
  .inforow .vwrap{display:flex;align-items:center;gap:10px}
  .inforow input,.inforow textarea{flex:1;border:none;background:none;font-family:inherit;font-size:15px;color:var(--ink);outline:none;padding:0;resize:none}
  .inforow textarea{min-height:44px;line-height:1.4}
  .cpbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--bg);border-radius:9px;padding:7px 11px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer}
  .cpbtn.ok{background:var(--confirmed);color:#fff;border-color:transparent}
  .infonote{font-size:12.5px;color:var(--ink-faint);margin:6px 2px 16px}

  /* sheet */
  #overlay{position:fixed;inset:0;background:rgba(40,20,28,.4);backdrop-filter:blur(2px);z-index:50;display:none}
  #overlay.show{display:block}
  #sheet{position:fixed;z-index:60;background:var(--bg);box-shadow:var(--shadow-lg);display:none;flex-direction:column;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;max-height:92vh;border-radius:22px 22px 0 0}
  #sheet.show{display:flex;animation:up .28s cubic-bezier(.2,.8,.2,1)}
  @keyframes up{from{transform:translate(-50%,40px);opacity:.6}to{transform:translate(-50%,0);opacity:1}}
  .sh-head{padding:16px 18px 12px;border-bottom:1px solid var(--line);position:relative}
  .sh-grab{width:38px;height:4px;border-radius:99px;background:var(--line);margin:0 auto 12px}
  .sh-close{position:absolute;right:14px;top:14px;width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:var(--card);font-size:15px;color:var(--ink-soft);cursor:pointer}
  .sh-name{font-family:'Fraunces',serif;font-weight:600;font-size:21px}
  .sh-sub{color:var(--ink-soft);font-size:13.5px;margin-top:2px}
  .sh-ordered{color:var(--ink-faint);font-size:11.5px;margin-top:5px;display:flex;align-items:center;gap:5px}
  .sh-ordered b{font-weight:600;color:var(--ink-soft)}
  .sh-body{overflow-y:auto;padding:16px 18px 24px}
  .sh-body::-webkit-scrollbar{width:0}
  .statusbtns{display:flex;gap:7px;flex-wrap:wrap}
  .sbtn{border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-soft);cursor:pointer}
  .sbtn.on{color:#fff;border-color:transparent}
  .sec{margin-top:18px}
  .sec .lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:8px}
  .sec .lbl .cnt{font-weight:600;letter-spacing:0;text-transform:none;color:var(--brand);margin-left:4px}
  .pgal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
  .pgal.one{grid-template-columns:1fr}
  .pgi{position:relative;display:block;border-radius:12px;overflow:hidden;border:1px solid var(--line);background:var(--card)}
  .pgal.one .pgi{border-radius:14px}
  .pgi img{width:100%;height:100%;aspect-ratio:1;object-fit:cover;display:block}
  .pgal.one .pgi img{aspect-ratio:auto;height:auto}
  .pgn{position:absolute;top:5px;left:5px;background:rgba(20,20,20,.6);color:#fff;font-size:10px;font-weight:700;
    width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .kv{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
  .kv .r{display:flex;justify-content:space-between;gap:14px;padding:11px 14px;border-bottom:1px solid var(--line);font-size:14px}
  .kv .r:last-child{border-bottom:none}
  .kv .k{color:var(--ink-soft);flex:0 0 auto}
  .kv .v{text-align:right;font-weight:500}
  .cols{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end}
  .cols span{display:inline-flex;align-items:center;gap:5px;font-size:13px}
  .cols i{width:13px;height:13px;border-radius:4px;border:1px solid rgba(0,0,0,.12)}
  .photo{background:var(--card);border:1px dashed var(--line);border-radius:14px;height:110px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:12px;flex-direction:column;gap:6px}
  .photo .big{font-size:26px}
  .notebox{background:var(--accent-soft);border-radius:12px;padding:11px 13px;font-size:13.5px;line-height:1.5;color:var(--ink)}
  .warnbox{background:#F7E4E0;border:1px solid #ECC9C2;border-radius:12px;padding:11px 13px;font-size:13px;color:#7A2233;line-height:1.5}

  /* payment block */
  .paywrap{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
  .paytop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .paytop .big{font-family:'Fraunces',serif;font-weight:600;font-size:20px}
  .paytop .left{font-size:13px;font-weight:600;color:var(--deposit)}
  .paytop .left.done{color:var(--paid)}
  .paytrack{height:9px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:12px}
  .payfill{height:100%;background:var(--paid);border-radius:99px;transition:width .3s}
  .payinput{display:flex;gap:8px;align-items:center}
  .payinput input{flex:1;border:1.5px solid var(--line);border-radius:11px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none}
  .payinput input:focus{border-color:var(--accent2)}
  .payquick{display:flex;gap:7px;margin-top:9px}
  .pqbtn{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:8px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer}

  .actionbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;padding:13px;font-family:inherit;font-weight:600;font-size:15px;cursor:pointer;border:none;margin-top:10px}
  .copybtn{background:var(--ink);color:#fff}
  .copybtn.ok{background:var(--confirmed)}
  .wa{background:#25D366;color:#fff;text-decoration:none}
  .readtoggle{width:100%;margin-top:10px;background:none;border:1px solid var(--line);border-radius:12px;padding:11px;font-family:inherit;font-weight:600;font-size:14px;color:var(--ink-soft);cursor:pointer}

  @media(min-width:560px){
    #sheet{bottom:auto;top:50%;transform:translate(-50%,-50%);border-radius:22px;max-height:88vh}
    #sheet.show{animation:pop .24s ease}
    @keyframes pop{from{transform:translate(-50%,-46%);opacity:.6}to{transform:translate(-50%,-50%);opacity:1}}
    .sh-grab{display:none}
  }

  /* 2026 operations redesign */
  :root{
    --bg:#F3F4F2;--card:#FFFFFF;--ink:#1E2523;--ink-soft:#65706C;--ink-faint:#98A09D;
    --line:#DDE2DF;--accent:#6D2435;--accent2:#8B3348;--accent-soft:#F4E8EB;
    --new:#B4233A;--quoted:#A46B16;--awaiting:#315E74;--confirmed:#34745A;--done:#64706C;
    --cancel:#A74646;--deleted:#7C8380;--paid:#34745A;--deposit:#A46B16;--unpaid:#7C8380;
    --shadow:0 1px 3px rgba(25,35,31,.06),0 8px 24px rgba(25,35,31,.04);
    --shadow-lg:0 24px 60px rgba(25,35,31,.22)
  }
  body{background:var(--bg)}
  #login{background:linear-gradient(160deg,#F4F5F3,#E7EAE7)}
  header{background:rgba(243,244,242,.94)}
  .tabs{background:#E6E9E6;border:1px solid var(--line)}
  .ordersUI{padding-bottom:7px}
  .buckets{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;padding:11px 0 0;overflow:visible;border-bottom:1px solid var(--line)}
  .bpill{min-width:0;justify-content:center;border:0;border-radius:0;background:transparent;padding:9px 4px 10px;position:relative;color:var(--ink-soft);gap:5px;white-space:nowrap}
  .bpill.active{background:transparent;color:var(--ink);box-shadow:none}
  .bpill.active::after{content:"";position:absolute;left:10px;right:10px;bottom:-1px;height:2px;background:var(--accent);border-radius:2px}
  .bpill .n{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;border-radius:99px;background:#E2E6E3;color:var(--ink);font-size:10px;opacity:1}
  .bpill .badge{position:absolute;top:2px;right:3px;box-shadow:0 0 0 2px var(--bg)}
  .statusrow{display:none}
  .ocard{border-radius:14px;padding:15px 16px;margin-bottom:9px;overflow:visible}
  .ocard::before{display:none}
  .ocard.unread{background:#FFF9FA;border-color:#D9A7B3;box-shadow:0 0 0 1px rgba(180,35,58,.06),var(--shadow)}
  .ocard.unread::after{content:"NEW";position:absolute;right:14px;top:-7px;background:var(--new);color:#fff;border-radius:99px;padding:3px 7px;font-size:9px;font-weight:800;letter-spacing:.08em}
  .oc-name{font-size:16px}.oc-name .dot{display:none!important}
  .oc-price{font-family:'Instrument Sans',system-ui,sans-serif;font-size:21px;font-weight:700;letter-spacing:-.02em}
  .oc-date{font-size:12.5px}.oc-timegrid{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;color:var(--ink-soft);font-size:12px}
  .oc-timegrid span{display:inline-flex;align-items:center;gap:5px}.oc-timegrid b{color:var(--ink);font-weight:600}
  .chip{display:none}.ghead{font-family:'Instrument Sans',system-ui,sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:11px;font-weight:700}
  #sheet{max-width:720px;background:var(--bg)}
  .sh-head{background:var(--card);padding-right:155px}

}

    btn.textContent='Tap again to permanently delete';
    setTimeout(()=>{if(delArmed===id){delArmed=null;
      const b=document.querySelector('.delbtn');
      if(b){b.classList.remove('confirm');b.textContent='🗑 Delete this order';}}},4000);
    return;
  }
  delArmed=null;
  btn.textContent='Deleting…';btn.disabled=true;
  const i=ORDERS.findIndex(x=>x.id===id);
  const backup=i>=0?ORDERS[i]:null;
  if(i>=0)ORDERS.splice(i,1);
  closeSheet();refreshView();
  if(sb)sb.from('orders').update({status:'deleted'}).eq('id',id).then(({error})=>{
    if(error){ if(backup)ORDERS.splice(i,0,backup); refreshView();
      alert('Could not delete this order: '+(error.message||error)); }
  });
}

  else L.push(`Deposit to confirm (50%): €${deposit}`);

function copyText(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).catch(()=>fallbackCopy(txt));}
  else fallbackCopy(txt);
}
function fallbackCopy(txt){const ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);}

async function saveQuote(id){const o=ORDERS.find(x=>x.id===id);const v=Number(document.getElementById('quotePrice').value);if(!Number.isFinite(v)||v<=0){alert('Enter the final quote before saving.');return;}o.price=v;o.range=false;const {error}=await sb.from('orders').update({price:v,price_range:false}).eq('id',id);if(error){alert('Could not save the quote: '+error.message);return;}refreshView();openSheet(id);}
async function setOrderStatus(id,st){const o=ORDERS.find(x=>x.id===id);if(!o)return;if(st==='quoted'&&!(o.price>0)){alert('Enter and save the final quote before moving this order to Quoted.');return;}if(st==='confirmed'&&o.paid<=0){alert('Record the received payment before moving this order forward.');return;}const patch={status:st};if(st==='cancelled'&&!o.cancelledBy)patch.cancelled_by='owner';const {error}=await sb.from('orders').update(patch).eq('id',id);if(error){alert('Could not update status: '+error.message);return;}o.status=st;if(patch.cancelled_by)o.cancelledBy=patch.cancelled_by;activeBucket=bucketOf(o);refreshView();openSheet(id);}
async function deleteOrder(id){const o=ORDERS.find(x=>x.id===id);if(!o)return;const next=o.status==='deleted'?'new':'deleted';const {error}=await sb.from('orders').update({status:next}).eq('id',id);if(error){alert('Could not move this order: '+error.message);return;}o.status=next;activeBucket=bucketOf(o);closeSheet();refreshView();}

function quoteMessage(o){const pt=orderLanguage(o)==='pt';const url=o.portalUrl||'[link will appear after generation]';return pt?`Olá ${o.name},\n\nO seu orçamento está pronto.\n\nConsulte o seu orçamento e os dados de pagamento através do link abaixo.\n${url}\n\nEste orçamento é válido durante 48 horas. Para reservar a sua data, o sinal de 50% deverá ser pago dentro deste prazo. Após 48 horas, a sua data poderá deixar de estar disponível.\n\nSe tiver alguma questão, basta responder a esta mensagem.${courierReminder(o,'pt')}`:`Hello ${o.name},\n\nYour quote is ready.\n\nView your quote and payment details using the link below.\n${url}\n\nThis quote is valid for 48 hours. To reserve your date, the 50% deposit must be paid within this time. After 48 hours, your date may no longer be available.\n\nIf you have any questions, simply reply to this message.${courierReminder(o,'en')}`;}

async function generatePortal(id){const o=ORDERS.find(x=>x.id===id);if(!o||o.status!=='quoted'||!(o.price>0)){alert('Save the final price and move the order to Quoted first.');return;}const {data,error}=await sb.rpc('create_order_portal',{p_order_id:id});if(error){alert('Customer links are not installed in Supabase yet. Apply the supplied SQL migration first.\n\n'+error.message);return;}const result=typeof data==='string'?JSON.parse(data):data;o.portalToken=result.token;o.portalExpires=result.expires_at;const portalBase=result.url||`https://byamandasoyer.pt/order/${result.token}`;o.portalUrl=portalBase+(portalBase.includes('?')?'&':'?')+'lang='+orderLanguage(o);openMessagePanel('quote');}

const LIST_TITLES={new_orders:'New Orders',waiting_customer:'Waiting Customer',deposit_paid:'Deposit Paid',cake_delivered:'Cake Delivered',done:'Done',cancelled:'Cancelled',deleted:'Archived'};
function renderList(){
  const q=document.getElementById('search').value.trim();let items=ORDERS.filter(o=>matchSearch(o,q)&&bucketOf(o)===activeBucket);const el=document.getElementById('main');
  if(!items.length){el.innerHTML=`<div class="empty">No orders here.</div>`;return;}
  let html='';
  if(activeBucket==='new_orders'){
    const fresh=sortCreated(items.filter(o=>!o.read)),opened=sortCreated(items.filter(o=>o.read));
    if(fresh.length){html+=`<div class="ghead"><span>Incoming Orders - New</span><span class="ln"></span><span>${fresh.length}</span></div>`;fresh.forEach(o=>html+=cardHTML(o));}
    if(opened.length){html+=`<div class="ghead"><span>Incoming Orders</span><span class="ln"></span><span>${opened.length}</span></div>`;opened.forEach(o=>html+=cardHTML(o));}
  }else{html+=`<div class="ghead"><span>${LIST_TITLES[activeBucket]||stLabel(activeBucket)}</span><span class="ln"></span><span>${items.length}</span></div>`;sortCreated(items).forEach(o=>html+=cardHTML(o));}
  el.innerHTML=html;

/* ---------- auth ---------- */
/* keep the board fresh: new orders and survey feedback arrive without a reload.
   The survey lands moments after the order, so a short poll picks it up. */
let pollTimer=null;
function startAutoRefresh(){
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(()=>{if(!document.hidden)refreshOrders();},15000);
}
document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshOrders();});

async function tryLogin(){
  const pw=document.getElementById('pw').value;
  document.getElementById('pwErr').style.display='none';
  if(!sb){document.getElementById('pwErr').textContent='Connection not ready — refresh the page.';document.getElementById('pwErr').style.display='block';return;}
  try{
    const {error}=await sb.auth.signInWithPassword({email:LOGIN_EMAIL,password:pw});
    if(error)throw error;
    await loadAll();
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    setView('orders');
    startAutoRefresh();
  }catch(e){
    document.getElementById('pwErr').textContent='Wrong password — try again.';
    document.getElementById('pwErr').style.display='block';
  }
}
function logout(){if(sb)sb.auth.signOut();document.getElementById('app').style.display='none';document.getElementById('login').style.display='flex';document.getElementById('pw').value='';document.getElementById('pwErr').style.display='none';}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});

/* stay signed in across reloads */
(async function(){if(!sb)return;try{const {data}=await sb.auth.getSession();if(data&&data.session){await loadAll();document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';setView('orders');startAutoRefresh();}}catch(e){}})();
